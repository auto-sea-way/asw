name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g., 0.1.0)"
        required: true
        type: string
      graph_tag:
        description: "Tag of the draft release containing asw.graph (e.g., draft-graph)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  checks: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    uses: ./.github/workflows/ci-check.yml

  build:
    needs: [check]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: asw-linux-amd64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: asw-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: asw-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: asw-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Add target
        if: ${{ !matrix.cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-${{ matrix.target }}-

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p asw-cli

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p asw-cli

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/asw ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Guard — must run on main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release must be triggered from main branch (got ${{ github.ref }})"
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Download graph file
        run: gh release download "${{ inputs.graph_tag }}" --pattern 'asw.graph' --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f -name 'asw-*' -exec cp {} release/ \;
          cp asw.graph release/
          cd release
          sha256sum asw-* asw.graph > SHA256SUMS

      - name: Create annotated tag
        run: |
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/git/tags -f tag="v${{ inputs.version }}" \
            -f message="Release v${{ inputs.version }}" -f object="$SHA" -f type=commit \
            --jq '.sha' | xargs -I{} \
          gh api repos/${{ github.repository }}/git/refs -f ref="refs/tags/v${{ inputs.version }}" -f sha={}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the given version from CHANGELOG.md
          # Falls back to auto-generated notes if section not found
          VERSION="${{ inputs.version }}"
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1; next
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "generate_notes=true" >> "$GITHUB_OUTPUT"
            echo "body=" >> "$GITHUB_OUTPUT"
          else
            echo "generate_notes=false" >> "$GITHUB_OUTPUT"
            {
              echo "body<<CHANGELOG_EOF"
              echo "$BODY"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.generate_notes == 'true' }}
          files: |
            release/asw-*
            release/asw.graph
            release/SHA256SUMS

  docker:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: asw-linux-*
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x asw-linux-*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slim image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Build and push full image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.full
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            ASW_GRAPH_URL=https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/asw.graph
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}-full
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-full

      - name: Make container package public
        # Only works for org-owned repos; silently skipped otherwise.
        run: |
          gh api \
            --method PUT \
            'orgs/${{ github.repository_owner }}/packages/container/asw/visibility' \
            -f visibility=public || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
