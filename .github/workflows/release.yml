name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g., 0.1.0)"
        required: true
        type: string
      graph_tag:
        description: "Tag of the draft release containing asw.graph (e.g., draft-graph)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  checks: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    uses: ./.github/workflows/ci-check.yml

  build:
    needs: [check]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: asw-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: asw-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: asw-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: asw-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-${{ matrix.target }}-

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p asw-cli

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p asw-cli

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/asw ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Guard — must run on main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release must be triggered from main branch (got ${{ github.ref }})"
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Download graph file
        run: gh release download "${{ inputs.graph_tag }}" --pattern 'asw.graph' --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f -name 'asw-*' -exec cp {} release/ \;
          cp asw.graph release/
          cd release
          sha256sum asw-* asw.graph > SHA256SUMS

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            release/asw-*
            release/asw.graph
            release/SHA256SUMS
          generate_release_notes: true

  docker:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: asw-linux-*
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x asw-linux-*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slim image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Build and push full image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.full
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            ASW_GRAPH_URL=https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/asw.graph
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}-full
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-full
